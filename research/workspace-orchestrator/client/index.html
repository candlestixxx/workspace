<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Workspace Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-start { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
        .btn-bun { background: linear-gradient(135deg, #fbcfe8 0%, #f472b6 100%); color: #831843; }
        .btn-stop { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .btn-folder { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .btn-exe { background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold tracking-tight text-white mb-2">Omni-Workspace</h1>
                <p class="text-slate-400">Project Process & Port Orchestrator</p>
            </div>
            <div class="flex gap-4">
                <button onclick="refresh()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition-all text-sm font-semibold">Refresh List</button>
            </div>
        </header>

        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Projects will be injected here -->
        </div>
    </div>

    <!-- Log Modal -->
    <div id="log-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-8">
        <div class="bg-slate-900 w-full max-w-4xl h-[80vh] rounded-2xl border border-slate-700 flex flex-col">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                <h3 id="log-title" class="font-bold">Project Logs</h3>
                <button onclick="closeLogs()" class="text-slate-400 hover:text-white">&times; Close</button>
            </div>
            <pre id="log-content" class="p-4 flex-1 overflow-auto text-xs font-mono text-green-400 bg-black"></pre>
        </div>
    </div>

    <script>
        const API = 'http://localhost:2999/api';

        async function fetchProjects() {
            const res = await fetch(`${API}/projects`);
            return await res.json();
        }

        async function startProject(name, path, engine) {
            const btn = document.getElementById(`btn-${name}-${engine}`);
            if (btn) {
                btn.innerText = 'Starting...';
                btn.disabled = true;
            }
            
            const res = await fetch(`${API}/start`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, path, engine })
            });
            const data = await res.json();
            if (data.port) {
                window.open(`http://localhost:${data.port}`, '_blank');
            }
            refresh();
        }

        async function stopProject(name) {
            await fetch(`${API}/stop`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            refresh();
        }

        async function openFolder(path) {
            await fetch(`${API}/open-folder`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path })
            });
        }

        async function runExe(path) {
            const res = await fetch(`${API}/run-exe`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path })
            });
            const data = await res.json();
            if (data.error) {
                alert('Error: ' + data.error);
            } else {
                alert('Started: ' + data.exe);
            }
        }

        async function showLogs(name) {
            const res = await fetch(`${API}/logs/${name}`);
            const data = await res.json();
            document.getElementById('log-title').innerText = `Logs: ${name}`;
            document.getElementById('log-content').innerText = data.logs;
            document.getElementById('log-modal').classList.remove('hidden');
        }

        function closeLogs() {
            document.getElementById('log-modal').classList.add('hidden');
        }

        async function refresh() {
            const projects = await fetchProjects();
            const grid = document.getElementById('project-grid');
            grid.innerHTML = projects.map(p => {
                const safePath = p.path.replace(/\\/g, '\\\\');
                return `
                <div class="glass p-6 rounded-2xl shadow-xl transition-all hover:scale-[1.02] flex flex-col">
                    <div class="flex justify-between items-start mb-4 cursor-pointer" onclick="openFolder('${safePath}')" title="Click to open folder">
                        <h2 class="text-xl font-bold text-blue-400 hover:text-blue-300 underline">${p.name}</h2>
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider ${p.isRunning ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-slate-700 text-slate-400'}">
                            ${p.isRunning ? 'Running' : 'Idle'}
                        </span>
                    </div>
                    <p class="text-xs text-slate-400 mb-2 truncate">${p.type} | v${p.version}</p>
                    <p class="text-xs text-slate-500 mb-6 truncate" ondblclick="runExe('${safePath}')" title="Double click to run exe">${p.path.split('workspace')[1] || p.path}</p>
                    
                    <div class="mt-auto flex flex-col gap-3">
                        <div class="flex gap-2">
                            <button onclick="openFolder('${safePath}')" class="flex-1 py-1 px-2 btn-folder rounded text-xs font-bold text-white shadow">Folder</button>
                            ${p.hasExe ? `<button ondblclick="runExe('${safePath}')" title="Double click to run" class="flex-1 py-1 px-2 btn-exe rounded text-xs font-bold text-white shadow">Run Exe</button>` : ''}
                        </div>
                        ${p.isRunning ? `
                            <div class="flex gap-2">
                                <a href="http://localhost:${p.port}" target="_blank" class="flex-1 py-2 px-4 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-center text-sm font-bold transition-all text-white">
                                    Open (Port ${p.port})
                                </a>
                                <button onclick="showLogs('${p.name}')" class="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-white">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                </button>
                            </div>
                            <button onclick="stopProject('${p.name}')" class="w-full py-2 btn-stop rounded-lg text-sm font-bold shadow-lg text-white">Stop Service</button>
                        ` : `
                            ${p.type === 'node' ? `
                            <div class="flex gap-2">
                                <button id="btn-${p.name}-node" onclick="startProject('${p.name}', '${safePath}', 'node')" class="flex-1 py-2 btn-start rounded-lg text-sm font-bold shadow-lg text-white">Run Node</button>
                                <button id="btn-${p.name}-bun" onclick="startProject('${p.name}', '${safePath}', 'bun')" class="flex-1 py-2 btn-bun rounded-lg text-sm font-bold shadow-lg">Run Bun</button>
                            </div>
                            ` : ''}
                        `}
                    </div>
                </div>
            `}).join('');
        }

        refresh();
        setInterval(refresh, 5000); // Auto refresh every 5s
    </script>
</body>
</html>
